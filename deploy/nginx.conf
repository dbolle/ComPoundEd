# Compounded static PWA.
#
# Caching contract for a PWA (same as Brick Recall's):
#  - entry points (index.html, sw.js, registerSW.js, manifest) must always
#    revalidate, or browsers serve stale versions for hours and the service
#    worker itself never updates;
#  - hashed bundles under /assets/ are immutable forever;
#  - stable-URL icons get a short TTL (the service worker precache handles
#    their real versioning).
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Family backup: LAN-only profile store (opt-in from the Grown-Ups area).
    # Same-origin, so it works from both the :8091 and compounded.lan fronts.
    location /sync/ {
        alias /sync/;
        dav_methods PUT DELETE;
        create_full_put_path on;
        dav_access user:rw group:r all:r;
        client_max_body_size 4m;
        autoindex on;
        autoindex_format json;
        add_header Cache-Control "no-store";
    }

    location = /index.html {
        add_header Cache-Control "no-cache";
    }
    location = /sw.js {
        add_header Cache-Control "no-cache";
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache";
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
    }

    location /assets/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location ~ ^/workbox-.*\.js$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }
    location /icons/ {
        add_header Cache-Control "public, max-age=3600";
    }

    location / {
        try_files $uri $uri/ =404;
    }
}
